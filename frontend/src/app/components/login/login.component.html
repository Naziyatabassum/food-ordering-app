<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-logo"><i class="fa-solid fa-utensils"></i></span>
      <h1>FoodApp</h1>
      <p>Delicious food delivered to you</p>
    </div>
    <div class="toggle-tabs">
      <button [class.active]="!isAdmin" (click)="isAdmin = false"><i class="fa-solid fa-user"></i> User Login</button>
      <button [class.active]="isAdmin" (click)="isAdmin = true"><i class="fa-solid fa-user-shield"></i> Admin Login</button>
    </div>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="error" *ngIf="error">{{error}}</div>
      <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
    <div class="register-link">
      <p *ngIf="!isAdmin">Don't have an account? <a routerLink="/register">Register here</a></p>
      <p *ngIf="isAdmin">&nbsp;</p>
    </div>
  </div>
</div>
